name: Sync FIFA Results Hybrid

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * 11-30 6 *"
    - cron: "*/30 * 1-19 7 *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-fifa-results-hybrid
  cancel-in-progress: true

jobs:
  sync:
    name: Sync official fallback data
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.SYNC_PR_TOKEN || github.token }}
      WORLD_CUP_TZ: America/Los_Angeles
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PR_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync FIFA results snapshot
        run: |
          set -o pipefail
          pnpm sync:fifa:pr | tee fifa-results-sync.log

      - name: Run matchday readiness
        env:
          MATCHDAY_EDITORIAL_WARN_ONLY: "1"
        run: |
          set -o pipefail
          pnpm matchday:readiness | tee matchday-readiness.log

      - name: Validate official fallback data
        run: |
          set -o pipefail
          pnpm validate | tee official-validation.log

      - name: Audit official fallback data
        run: |
          pnpm audit:schedule
          pnpm run audit

      - name: Detect official fallback data changes
        id: official_changes
        run: |
          if [ -n "$(git status --porcelain -- data/fixtures.json data/standings.json data/tournament.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit official fallback data to main
        if: steps.official_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fixtures.json data/standings.json data/tournament.json
          git commit -m "Update official FIFA fallback snapshot"
          git push origin HEAD:main

      - name: Sync FIFA goal events
        run: |
          set -o pipefail
          pnpm sync:fifa:goals | tee fifa-goal-events-sync.log

      - name: Refresh result highlights
        run: |
          set -o pipefail
          pnpm results | tee result-highlights.log

      - name: Validate generated review data and refresh profile cards
        run: |
          set -o pipefail
          pnpm validate:profiles | tee profile-validation.log

      - name: Audit generated review data
        run: |
          pnpm run audit
          pnpm results:check
          pnpm cards:check

      - name: Detect generated review changes
        id: review_changes
        run: |
          if [ -n "$(git status --porcelain -- data/fixtures.json data/player-profiles.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build pull request body
        if: steps.review_changes.outputs.changed == 'true'
        run: |
          cat > fifa-sync-pr.md <<'EOF'
          Automated generated-data follow-up from FIFA's official match feed.

          Official score/status/standings fallback JSON is committed directly to `main` after validation.
          This PR keeps generated scorer events, result highlights, and player-card/profile curation reviewable.

          ## FIFA Results Sync

          ```text
          EOF
          cat fifa-results-sync.log >> fifa-sync-pr.md
          cat >> fifa-sync-pr.md <<'EOF'
          ```

          ## FIFA Goal Event Sync

          ```text
          EOF
          cat fifa-goal-events-sync.log >> fifa-sync-pr.md
          cat >> fifa-sync-pr.md <<'EOF'
          ```

          ## Result Highlights

          ```text
          EOF
          cat result-highlights.log >> fifa-sync-pr.md
          cat >> fifa-sync-pr.md <<'EOF'
          ```

          ## Matchday Readiness

          ```text
          EOF
          cat matchday-readiness.log >> fifa-sync-pr.md
          cat >> fifa-sync-pr.md <<'EOF'
          ```

          ## Profile Validation

          ```text
          EOF
          cat profile-validation.log >> fifa-sync-pr.md
          cat >> fifa-sync-pr.md <<'EOF'
          ```

          ## Checks

          - `pnpm validate:profiles`
          - `pnpm run audit`
          - `pnpm results:check`
          - `pnpm cards:check`
          EOF

      - name: Commit generated review data
        if: steps.review_changes.outputs.changed == 'true'
        run: |
          branch="codex/fifa-results-sync"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"
          git add data/fixtures.json data/player-profiles.json
          git commit -m "Update FIFA goal events, profiles, and result highlights"
          git push --force-with-lease origin "$branch"

      - name: Open or update pull request
        if: steps.review_changes.outputs.changed == 'true'
        run: |
          branch="codex/fifa-results-sync"
          title="Update FIFA goal events, profiles, and result highlights"
          pr_number="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --base main --title "$title" --body-file fifa-sync-pr.md
          else
            gh pr create --base main --head "$branch" --title "$title" --body-file fifa-sync-pr.md
          fi
