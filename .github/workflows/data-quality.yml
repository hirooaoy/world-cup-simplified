name: Data Quality

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Validate data and UI
    runs-on: ubuntu-latest
    env:
      WORLD_CUP_TZ: America/Los_Angeles
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync FIFA results snapshot
        run: pnpm sync:fifa

      - name: Sync FIFA goal events
        run: pnpm sync:fifa:goals

      - name: Refresh result highlights
        run: pnpm results

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run data and UI checks
        run: pnpm test
