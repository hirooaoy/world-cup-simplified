  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="./" aria-label="World Cup Simplified home">
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M18.6 24.5c-.5-4.8 1.3-9.5 4.8-12.4 3.6-2.9 8.2-3.9 12.4-2.7 4.8 1.4 8.4 4.5 10.1 8.6 1.6 4.2 1 9.3-1.3 13-2.5 4.1-6.7 6.8-11.7 6.9-5 .1-9.7-2.3-12.2-5.7-1.5-2.1-2-4.8-2.1-7.7Z" />

          <path d="M40.5 14.5c-1.3 1.9-4.6 1.2-5 3.6-.4 2.2 2.7 2.7 3.9 3.8 1.4 1.2-.2 3 1.6 3.8 1.7.8 3.3.2 4.4 1.5" />

          <path d="M25.3 41.2c2.7 4.4 4.1 9.2 3.1 15.1" />

        <span>World Cup Simplified</span>
      </a>
      <div class="header-view-actions">
        <nav class="view-tabs" aria-label="World Cup views" role="tablist">
          <button class="view-tab is-active" id="matches-tab" type="button" role="tab" data-view="matches" aria-controls="matches-view" aria-selected="true">
            Matches
          </button>
          <button class="view-tab" id="standings-tab" type="button" role="tab" data-view="standings" aria-controls="standings-view" aria-selected="false" tabindex="-1">
            Standings
          </button>
        </nav>
        <div class="catch-up-shell">
          <button class="catch-up-button" id="catch-up-button" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="catch-up-popover">
            Catch Up
          </button>
          <div class="catch-up-popover is-hidden" id="catch-up-popover" role="dialog" aria-labelledby="catch-up-heading">
            <div class="catch-up-header">
              <h2 id="catch-up-heading">Catch Up</h2>
              <time id="catch-up-date" datetime="">Today</time>
            </div>
            <div class="catch-up-list" id="catch-up-list"></div>
          </div>
        </div>
      </div>
      <label class="timezone-control">
        <span class="visually-hidden">Time zone</span>
        <select class="timezone-select" id="timezone-select"></select>
      </label>
    </header>

    <main class="page-shell">
      <section class="view-panel" id="matches-view" role="tabpanel" aria-labelledby="matches-tab">
        <section class="page-title" aria-labelledby="matches-heading">
          <h1 class="date-nav" id="matches-heading">
            <button class="date-jump" id="day-label" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="date-popover">
              Today
            </button>
          </h1>
          <div class="date-popover is-hidden" id="date-popover" role="dialog" aria-label="Choose match date">
            <div class="calendar-header">
              <button class="calendar-nav-button is-prev" id="calendar-prev-month" type="button" aria-label="Previous month"></button>
              <p id="calendar-month-label">Month</p>
              <button class="calendar-nav-button is-next" id="calendar-next-month" type="button" aria-label="Next month"></button>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>Sun</span>
              <span>Mon</span>
              <span>Tue</span>
              <span>Wed</span>
              <span>Thu</span>
              <span>Fri</span>
              <span>Sat</span>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div class="calendar-footer">
              <button class="calendar-shortcut-button" id="calendar-yesterday" type="button">Yesterday</button>
              <button class="calendar-shortcut-button" id="calendar-today" type="button">Today</button>
            </div>
          </div>
        </section>

        <section class="match-layout" aria-label="Matches and selected match details">
          <section class="match-list" id="match-list" aria-live="polite" aria-label="Matches"></section>

          <aside class="match-info is-hidden" id="match-info" aria-live="polite" hidden></aside>
        </section>
      </section>

      <section class="view-panel is-hidden" id="standings-view" role="tabpanel" aria-labelledby="standings-tab" hidden>
        <section class="standings-title">
          <h1 id="standings-heading">
            <button class="standings-year-button" id="standings-year-button" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="standings-year-popover">
              2026
            </button>
            <span>Standings</span>
          </h1>
          <div class="standings-year-popover is-hidden" id="standings-year-popover" role="dialog" aria-label="Choose standings year">
            <div class="standings-year-grid" id="standings-year-grid"></div>
          </div>
          <p id="standings-summary">Top two in each group advance. The best eight third-place teams also reach the Round of 32.</p>
        </section>
        <section class="standings-grid" id="standings-grid" aria-live="polite" aria-label="Group standings"></section>
      </section>
    </main>

    <footer class="site-footer">
      <p id="source-note">
        Sources: <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/articles/match-schedule-fixtures-results-teams-stadiums">FIFA schedule</a>, <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/articles/debutants-cabo-verde-curacao-jordan-uzbekistan">debutants</a>, <a href="https://inside.fifa.com/fifa-world-ranking/men">ranking</a>, <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/standings">standings</a>. Predictions are unofficial.
      </p>
    </footer>

</html>
